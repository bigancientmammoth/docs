site_name: MarketAut
site_url: https://marketaut.ru

markdown_extensions:
  # Obsidian и многие другие редакторы поддерживают «мягкие переносы» — одиночный перенос строки в исходнике превращается в <br>.
  # Стандартный CommonMark (который использует MkDocs) так не делает: одиночный перенос строки игнорируется, нужно два подряд (пустая строка) для нового абзаца.
  - nl2br
  - mdx_truly_sane_lists
  - toc:
      toc_depth: 3
nav:
  - Помощь: "1-help/help.md"
  - Быстрый старт: "2-quick-start/quick_start.md"
  - Начало работы: "3-start/register.md"
  - Работа в системе:
    - Общие концепции: "4-platform/00-intro.md"
    - Аккаунты: "4-platform/01-accounts.md"
    - Типы аккаунтов: "4-platform/02-account-types.md"
    - Диаграммы: "4-platform/03-diagrams.md"
    - Настройка диаграмм: "4-platform/04-diagrams-edit.md"
  - Работа с ИИ:
    - Claude: "5-ai/01-claude.md"
    - ChatGPT: "5-ai/02-chat-gpt.md"
